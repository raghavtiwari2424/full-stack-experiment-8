<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exp 3.1.3 — RBAC System</title>
<link rel="stylesheet" href="../lab.css">
<style>
  .role-tabs { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .role-tab { padding:8px 20px; border-radius:20px; font-size:.85rem; font-weight:600; cursor:pointer; border:2px solid transparent; transition:.2s; }
  .role-tab.admin   { background:rgba(248,113,113,.1); color:#f87171; border-color:rgba(248,113,113,.3); }
  .role-tab.manager { background:rgba(251,191,36,.1);  color:#fbbf24; border-color:rgba(251,191,36,.3); }
  .role-tab.user    { background:rgba(52,211,153,.1);  color:#34d399; border-color:rgba(52,211,153,.3); }
  .role-tab.active  { filter:brightness(1.4); border-width:2px; box-shadow:0 0 12px rgba(255,255,255,.1); }
  .perm-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .perm-card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:14px; transition:.3s; }
  .perm-card.allowed { border-color:rgba(52,211,153,.3); background:rgba(52,211,153,.05); }
  .perm-card.denied  { opacity:.45; }
  .perm-icon { font-size:1.5rem; margin-bottom:6px; }
  .perm-name { font-size:.85rem; font-weight:600; color:#e2e8f0; }
  .perm-status { font-size:.72rem; margin-top:4px; font-weight:600; }
  .allowed .perm-status { color:#34d399; }
  .denied  .perm-status { color:#f87171; }
  .rbac-matrix { width:100%; border-collapse:collapse; font-size:.82rem; }
  .rbac-matrix th { color:#64748b; padding:8px 12px; border-bottom:1px solid rgba(255,255,255,.06); text-align:left; }
  .rbac-matrix td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.04); }
  .rbac-matrix tr:hover td { background:rgba(255,255,255,.02); }
  .check { color:#34d399; font-size:1rem; }
  .cross { color:#f87171; font-size:.85rem; opacity:.5; }
  .active-role-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:.82rem; font-weight:600; margin-bottom:12px; }
</style>
</head>
<body>
<div class="lab-container">
  <a href="../index.html" class="back-btn">← Back to Hub</a>
  <div class="lab-header">
    <div class="exp-badge">Exp 3.1.3</div>
    <h1>Role-Based Access Control</h1>
    <p>React Context · Express Middleware · Dynamic UI Permissions</p>
  </div>

  <!-- Role Switcher -->
  <div class="lab-card">
    <h2 class="card-title">👤 Switch Active Role</h2>
    <div class="role-tabs">
      <div class="role-tab admin active" id="tab-admin" onclick="switchRole('admin')">🔴 Admin</div>
      <div class="role-tab manager" id="tab-manager" onclick="switchRole('manager')">🟡 Manager</div>
      <div class="role-tab user" id="tab-user" onclick="switchRole('user')">🟢 User</div>
    </div>
    <div id="roleDesc" style="font-size:.82rem;color:#64748b;"></div>
  </div>

  <!-- Dynamic UI -->
  <div class="lab-card">
    <h2 class="card-title">🖥️ Dynamic UI — Permissions View</h2>
    <div id="activeBadge"></div>
    <div class="perm-grid" id="permGrid"></div>
  </div>

  <!-- Permission Matrix -->
  <div class="lab-card">
    <h2 class="card-title">📋 Permission Matrix</h2>
    <table class="rbac-matrix">
      <thead>
        <tr><th>Action</th><th>Admin</th><th>Manager</th><th>User</th></tr>
      </thead>
      <tbody id="matrixBody"></tbody>
    </table>
  </div>
</div>

<script>
const ROLES = {
  admin: {
    label:'Administrator', color:'#f87171', bg:'rgba(248,113,113,.12)',
    desc:'Full system access. Can manage users, view reports, and configure system settings.',
    perms:['View Dashboard','Manage Users','Edit Content','View Reports','Delete Records','System Config','API Access','Audit Logs']
  },
  manager: {
    label:'Manager', color:'#fbbf24', bg:'rgba(251,191,36,.12)',
    desc:'Can view reports and edit content. Cannot manage users or configure system.',
    perms:['View Dashboard','Edit Content','View Reports','API Access']
  },
  user: {
    label:'Standard User', color:'#34d399', bg:'rgba(52,211,153,.12)',
    desc:'Basic access only. Can view their dashboard and manage their own profile.',
    perms:['View Dashboard']
  }
};

const ALL_PERMS = [
  { name:'View Dashboard', icon:'📊' },
  { name:'Manage Users',   icon:'👥' },
  { name:'Edit Content',   icon:'✏️' },
  { name:'View Reports',   icon:'📈' },
  { name:'Delete Records', icon:'🗑️' },
  { name:'System Config',  icon:'⚙️' },
  { name:'API Access',     icon:'🔌' },
  { name:'Audit Logs',     icon:'📋' },
];

const MATRIX = [
  ['View Dashboard','✅','✅','✅'],
  ['Manage Users','✅','❌','❌'],
  ['Edit Content','✅','✅','❌'],
  ['View Reports','✅','✅','❌'],
  ['Delete Records','✅','❌','❌'],
  ['System Config','✅','❌','❌'],
  ['API Access','✅','✅','❌'],
  ['Audit Logs','✅','❌','❌'],
];

let currentRole = 'admin';

function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+role).classList.add('active');
  const r = ROLES[role];
  document.getElementById('roleDesc').textContent = r.desc;
  renderPermGrid(role);
  renderMatrix();
}

function renderPermGrid(role) {
  const r = ROLES[role];
  document.getElementById('activeBadge').innerHTML =
    `<div class="active-role-badge" style="background:${r.bg};color:${r.color};border:1px solid ${r.color}40;">Active Role: ${r.label}</div>`;
  document.getElementById('permGrid').innerHTML = ALL_PERMS.map(p => {
    const allowed = r.perms.includes(p.name);
    return `<div class="perm-card ${allowed ? 'allowed' : 'denied'}">
      <div class="perm-icon">${p.icon}</div>
      <div class="perm-name">${p.name}</div>
      <div class="perm-status">${allowed ? '✅ Allowed' : '🚫 Denied'}</div>
    </div>`;
  }).join('');
}

function renderMatrix() {
  document.getElementById('matrixBody').innerHTML = MATRIX.map(r => {
    const cols = r.slice(1).map(v => `<td style="text-align:center">${v}</td>`).join('');
    return `<tr><td>${r[0]}</td>${cols}</tr>`;
  }).join('');
}

switchRole('admin');
</script>
</body>
</html>
